name: PR — Patient Service

on:
  pull_request:
    branches: [main]
    paths:
      - "services/patient/**"

jobs:
  build:
    name: Build e Formatação
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restaurar dependências
        run: dotnet restore services/patient/PatientService.slnx

      - name: Build
        run: dotnet build services/patient/PatientService.slnx --no-restore --configuration Release

      - name: Verificar formatação
        run: dotnet format services/patient/PatientService.slnx whitespace --verify-no-changes --no-restore

  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: build
    if: hashFiles('services/patient/**/*.Tests.csproj') != ''

    steps:
      - uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restaurar dependências
        run: dotnet restore services/patient/PatientService.slnx

      - name: Executar testes
        run: dotnet test services/patient/PatientService.slnx --no-restore --configuration Release
