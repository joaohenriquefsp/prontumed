name: PR — Medical Record Service

on:
  pull_request:
    branches: [main]
    paths:
      - "services/medical-record/**"
  workflow_dispatch:

jobs:
  build:
    name: Build e Formatação
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restaurar dependências
        run: dotnet restore services/medical-record/MedicalRecordService.slnx

      - name: Build
        run: dotnet build services/medical-record/MedicalRecordService.slnx --no-restore --configuration Release

      - name: Verificar formatação
        run: dotnet format services/medical-record/MedicalRecordService.slnx whitespace --verify-no-changes --no-restore

  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: build
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restaurar dependências
        run: dotnet restore services/medical-record/MedicalRecordService.slnx

      - name: Executar testes
        run: dotnet test services/medical-record/MedicalRecordService.slnx --no-restore --configuration Release
