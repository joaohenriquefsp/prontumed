name: PR â€” Notification Service

on:
  pull_request:
    branches: [main]
    paths:
      - "services/notification/**"

jobs:
  build:
    name: Build e FormataÃ§Ã£o
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restaurar dependÃªncias
        run: dotnet restore services/notification/NotificationService.slnx

      - name: Build
        run: dotnet build services/notification/NotificationService.slnx --no-restore --configuration Release

      - name: Verificar formataÃ§Ã£o
        run: dotnet format services/notification/NotificationService.slnx whitespace --verify-no-changes --no-restore

  test:
    name: Testes
    runs-on: ubuntu-latest
    needs: build
    if: hashFiles('services/notification/**/*.Tests.csproj') != ''

    steps:
      - uses: actions/checkout@v4

      - name: Configurar .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restaurar dependÃªncias
        run: dotnet restore services/notification/NotificationService.slnx

      - name: Executar testes
        run: dotnet test services/notification/NotificationService.slnx --no-restore --configuration Release

