services:

  # ─────────────────────────────────────────────────────
  # BANCOS DE DADOS — PostgreSQL (Database per Service)
  # wal_level=logical obrigatório para Debezium CDC
  # ─────────────────────────────────────────────────────

  postgres-identity:
    image: postgres:16-alpine
    container_name: postgres-identity
    environment:
      POSTGRES_DB: db_identity
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata-identity:/var/lib/postgresql/data
      - ./infra/postgres/identity:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=5
      - -c
      - max_wal_senders=5
    networks:
      - prontumed-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d db_identity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-patients:
    image: postgres:16-alpine
    container_name: postgres-patients
    environment:
      POSTGRES_DB: db_patients
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata-patients:/var/lib/postgresql/data
      - ./infra/postgres/patients:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=5
      - -c
      - max_wal_senders=5
    networks:
      - prontumed-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d db_patients"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-appointments:
    image: postgres:16-alpine
    container_name: postgres-appointments
    environment:
      POSTGRES_DB: db_appointments
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - pgdata-appointments:/var/lib/postgresql/data
      - ./infra/postgres/appointments:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=5
      - -c
      - max_wal_senders=5
    networks:
      - prontumed-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d db_appointments"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-medical:
    image: postgres:16-alpine
    container_name: postgres-medical
    environment:
      POSTGRES_DB: db_medical_records
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - pgdata-medical:/var/lib/postgresql/data
      - ./infra/postgres/medical:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=5
      - -c
      - max_wal_senders=5
    networks:
      - prontumed-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d db_medical_records"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres-notifications:
    image: postgres:16-alpine
    container_name: postgres-notifications
    environment:
      POSTGRES_DB: db_notifications
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - pgdata-notifications:/var/lib/postgresql/data
      - ./infra/postgres/notifications:/docker-entrypoint-initdb.d:ro
    networks:
      - prontumed-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d db_notifications"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────────
  # MENSAGERIA — Zookeeper + Kafka
  # ─────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
      - zk-log:/var/lib/zookeeper/log
    networks:
      - prontumed-net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dois listeners: um interno (Docker) e um externo (host)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - prontumed-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────
  # SMTP4DEV — servidor SMTP de desenvolvimento
  # Captura todos os e-mails enviados pelo Notification Service
  # sem entregá-los de fato. UI de inspeção: http://localhost:5080
  # ─────────────────────────────────────────────────────

  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: smtp4dev
    ports:
      - "5080:80"
      - "2525:25"
    networks:
      - prontumed-net
    restart: unless-stopped

  # ─────────────────────────────────────────────────────
  # KAFKA UI — visualização de tópicos e conectores
  # Acesso: http://localhost:8080
  # ─────────────────────────────────────────────────────

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: prontumed-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://debezium-connect:8083
    networks:
      - prontumed-net
    restart: unless-stopped

  # ─────────────────────────────────────────────────────
  # DEBEZIUM CONNECT — CDC via WAL do PostgreSQL
  # API REST: http://localhost:8083
  # Registrar conectores: ./infra/debezium/register-connectors.sh
  # ─────────────────────────────────────────────────────

  debezium-connect:
    image: debezium/connect:2.6
    container_name: debezium-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres-identity:
        condition: service_healthy
      postgres-patients:
        condition: service_healthy
      postgres-appointments:
        condition: service_healthy
      postgres-medical:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    networks:
      - prontumed-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

# ─────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────

volumes:
  pgdata-identity:
  pgdata-patients:
  pgdata-appointments:
  pgdata-medical:
  pgdata-notifications:
  zk-data:
  zk-log:
  kafka-data:

# ─────────────────────────────────────────────────────
# REDE INTERNA
# ─────────────────────────────────────────────────────

networks:
  prontumed-net:
    driver: bridge
